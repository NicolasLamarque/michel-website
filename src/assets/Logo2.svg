<svg xmlns="http://www.w3.org/2000/svg" viewBox="140 45 400 220" fill="none">
  <!-- Toit gauche rouge -->
  <path d="M 200,148 Q 290,62 340,55 Q 390,62 430,148"
    stroke="#6b1124" stroke-width="5" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    transform="translate(-22, 0)" />
  <!-- Toit centre or -->
  <path d="M 200,148 Q 290,62 340,55 Q 390,62 430,148"
    stroke="#d4af37" stroke-width="4.5" fill="none"
    stroke-linecap="round" stroke-linejoin="round" />
  <!-- Toit droite rouge -->
  <path d="M 200,148 Q 290,62 340,55 Q 390,62 430,148"
    stroke="#6b1124" stroke-width="5" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    transform="translate(22, 0)" />
  <!-- Ligne séparatrice -->
  <line x1="160" y1="165" x2="520" y2="165" stroke="#d4af37" stroke-width="0.8" opacity="0.5"/>
  <!-- MICHEL & Co -->
  <text x="340" y="210" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="48px" font-weight="700"
    letter-spacing="0.06em" fill="#f0f0f0">MICHEL<tspan fill="#d4af37" font-size="38px" dy="-2"> &amp; Co</tspan></text>
  <!-- CONSTRUCTION -->
  <text x="340" y="245" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="13px" letter-spacing="0.42em" fill="#d4af37">CONSTRUCTION</text>
</svg>
